<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reachlady</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
}

    /* 🔝 Top Flash Sale Bar */
.top-bar {
      background-color: #e91e63;
      color: white;
      font-size: 14px;
      padding: 8px 0;
      text-align: center;
      overflow: hidden;
}

.top-bar span {
      display: inline-block;
      white-space: nowrap;
      animation: scrollText 10s linear infinite;
}

    @keyframes scrollText {
      0% { transform: translateX(100%);}
      100% { transform: translateX(-100%);}
}

.top-bar a {
      color: #fff;
      font-weight: bold;
      text-decoration: underline;
      margin-left: 10px;
}

    /* 🧭 Header */
    header {
      background-color: #f8f8f8;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
}

.logo img {
      height: 60px;
}

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
}

    nav a {
      color: #000;
      text-decoration: none;
      text-transform: uppercase;
      font-weight: 500;
      padding: 10px 15px;
      transition: background-color 0.3s ease;
}

    nav a:hover {
      background-color: #555;
      color: white;
      border-radius: 4px;
}

.header-icons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
}

.header-icons a {
      text-decoration: none;
      font-size: 18px;
      color: #e91e63;
      transition: color 0.3s ease;
}

.header-icons a:hover {
      color: #c2185b;
}

    /* 🔍 Search Box */
    #search-box {
      display: none;
      text-align: right;
      padding: 10px 20px;
}

    #search-box input {
      padding: 8px;
      font-size: 14px;
      width: 200px;
      border: 1px solid #ccc;
      border-radius: 4px;
}

    #search-box button {
      padding: 8px 12px;
      background-color: #e91e63;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
}

    #search-box button:hover {
      background-color: #c2185b;
}

    /* 🛍️ Banner Section */
.banner {
      background-color: #ffe4e1;
      text-align: center;
      padding: 40px 20px;
}

.banner h2 {
      font-size: 32px;
      margin: 0;
}

.banner p {
      font-size: 18px;
      margin: 10px 0;
}

.shop-btn {
      background-color: #e91e63;
      color: white;
      padding: 10px 20px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
}

.shop-btn:hover {
      background-color: #c2185b;
}

    /* 📞 Contact Info Section */
    #contact-info {
      display: none;
      background-color: #f1f1f1;
      padding: 20px;
      text-align: center;
}

    #contact-info h3 {
      margin-top: 0;
      color: #e91e63;
}

    /* 📱 Responsive */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: flex-start;
}

      nav {
        justify-content: flex-start;
        width: 100%;
}

.header-icons {
        justify-content: flex-start;
        width: 100%;
        margin-top: 10px;
}

      #search-box {
        text-align: left;
}
}
  </style>
</head>
<body>

  <!-- 🔝 Flash Sale Bar -->
<div class="top-bar">
    <span>We Are Opening very Soon — <a href="#">Contact with us</a></span>
  </div>

  <!-- 🧭 Header -->
  <header>
    <div class="logo">
      <img src="images/logo.png" alt="Reachlady Logo">
    </div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Best Sellers</a>
      <a href="#" id="search-link">Search</a>
      <a href="#">New Arrival</a>
      <a href="#">Sale</a>
      <a href="#" id="contact-link">Contact Us</a>
    </nav>

    <div class="header-icons">
      <a href="#" id="search-toggle"><i class="fas fa-search"></i></a>
      <a href="#"><i class="fas fa-user"></i></a>
      <a href="#"><i class="fas fa-heart"></i></a>
      <a href="#"><i class="fas fa-shopping-cart"></i></a>
    </div>
  </header>
  <!-- 🔍 Search Box -->
  <div id="search-box">
    <input type="text" placeholder="Search products...">
    <button type="submit">Search</button>
  </div>

  <!-- 📞 Contact Info -->
  <div id="contact-info">
    <h3>Contact Us</h3>
    <p>Email: support@reachlady.com</p>
    <p>Phone: +65 1234 5678</p>
    <p>Address: 123 Fashion Street, Singapore</p>
  </div>

  <!-- 🛍️ Banner Section -->
  <div class="banner">
    <h2>New Arrival</h2>
    <p>UP TO 55% OFF</p>
    <a href="#" class="shop-btn">SHOP NOW</a>
  </div>

  <!-- 🔧 JavaScript -->
  <script>
    // Toggle search box
    document.getElementById('search-toggle').addEventListener('click', function(e) {
      e.preventDefault();
      const box = document.getElementById('search-box');
      box.style.display = box.style.display === 'block'? 'none': 'block';
});

    // Show contact info
    document.getElementById('contact-link').addEventListener('click', function(e) {
      e.preventDefault();
      const contact = document.getElementById('contact-info');
      contact.style.display = contact.style.display === 'block'? 'none': 'block';
});
  </script>

</body>
</html>
